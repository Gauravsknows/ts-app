name: Build and Push Docker Images

# Trigger this workflow every time code is pushed to the 'main' branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull your code from GitHub onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log into your Docker Hub account using the secrets we saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx (allows advanced caching to make builds faster)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build and push the Backend Image
      # (Adjust the 'context' path if your backend Dockerfile is in a subdirectory, like './backend')
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ts-app-backend:latest

      # Step 5: Build and push the Frontend Image
      # (Adjust the 'context' path to where your frontend folder is, like './frontend')
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ts-app-frontend:latest